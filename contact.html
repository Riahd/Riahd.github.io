<link rel="stylesheet" href="space-style.css" />
<style>
  /* ===== CONTACT PAGE — Premium Dark ===== */
  .contact-wrapper {
    min-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px 80px;
  }

  .contact-card {
    width: 100%;
    max-width: 520px;
    background: rgba(12, 10, 28, 0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(139, 92, 246, 0.18);
    border-radius: 22px;
    padding: 48px 44px 42px;
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.45),
      0 0 60px rgba(139, 92, 246, 0.06),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    animation: contactFadeIn 0.7s ease-out both;
  }

  @keyframes contactFadeIn {
    from {
      opacity: 0;
      transform: translateY(24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Avatar + Name */
  .contact-identity {
    text-align: center;
    margin-bottom: 36px;
  }
  .contact-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(96, 165, 250, 0.18));
    border: 2px solid rgba(139, 92, 246, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 2rem;
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
  }
  .contact-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f0f0f8;
    margin: 0 0 6px;
    letter-spacing: 0.3px;
    background: linear-gradient(135deg, #f0f0f8 40%, #C4B5FD);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .contact-role {
    font-size: 0.82rem;
    color: rgba(196, 181, 253, 0.6);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 500;
    margin: 0;
  }

  /* Separator */
  .contact-sep {
    width: 50px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
    border: none;
    margin: 28px auto 30px;
    border-radius: 2px;
  }

  /* Contact rows */
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 34px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(255, 255, 255, 0.05);
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .contact-row:hover {
    background: rgba(139, 92, 246, 0.08);
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: 0 4px 18px rgba(139, 92, 246, 0.1);
    transform: translateX(4px);
  }

  .contact-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(139, 92, 246, 0.04));
    border: 1px solid rgba(139, 92, 246, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
    transition: all 0.3s ease;
  }
  .contact-row:hover .contact-icon {
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.22), rgba(139, 92, 246, 0.1));
    border-color: rgba(139, 92, 246, 0.35);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.2);
  }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .contact-label {
    font-size: 0.7rem;
    color: rgba(196, 181, 253, 0.5);
    text-transform: uppercase;
    letter-spacing: 1.8px;
    font-weight: 600;
  }
  .contact-value {
    font-size: 0.92rem;
    color: #e0e0f0;
    font-weight: 400;
    letter-spacing: 0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contact-row:hover .contact-value {
    color: #fff;
  }

  /* CTA Button */
  .contact-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 28px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #8B5CF6, #6D28D9);
    color: #fff;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.35s ease;
    box-shadow: 0 4px 18px rgba(139, 92, 246, 0.25);
  }
  .contact-cta:hover {
    background: linear-gradient(135deg, #9D6FF8, #7C3AED);
    transform: translateY(-2px);
    box-shadow:
      0 8px 30px rgba(139, 92, 246, 0.35),
      0 0 20px rgba(139, 92, 246, 0.15);
  }
  .contact-cta:active {
    transform: translateY(0);
  }
  .contact-cta-icon {
    font-size: 1.1rem;
    transition: transform 0.3s ease;
  }
  .contact-cta:hover .contact-cta-icon {
    transform: translateX(3px);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .contact-card {
      padding: 36px 22px 32px;
      border-radius: 16px;
    }
    .contact-name {
      font-size: 1.35rem;
    }
    .contact-row {
      padding: 12px 14px;
      gap: 12px;
    }
    .contact-icon {
      width: 38px;
      height: 38px;
      font-size: 1rem;
    }
    .contact-value {
      font-size: 0.85rem;
    }
  }
</style>
</head>
